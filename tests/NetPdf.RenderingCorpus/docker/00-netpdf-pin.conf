<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  Visual-regression font pin. Alias the corpus's declared families (and the CSS generics) to the committed
  DejaVu Sans pack so the pinned-Chrome reference oracle shapes the SAME glyphs as NetPdf's
  PinnedFontResolver. With fonts controlled on both sides, the page-for-page diff isolates layout-engine
  deltas (NetPdf vs. Chrome) from font differences. Loaded first (00-) so it wins over the image defaults.
-->
<fontconfig>
  <alias binding="strong"><family>Helvetica Neue</family><prefer><family>DejaVu Sans</family></prefer></alias>
  <alias binding="strong"><family>Helvetica</family><prefer><family>DejaVu Sans</family></prefer></alias>
  <alias binding="strong"><family>Arial</family><prefer><family>DejaVu Sans</family></prefer></alias>
  <alias binding="strong"><family>sans-serif</family><prefer><family>DejaVu Sans</family></prefer></alias>
  <alias binding="strong"><family>serif</family><prefer><family>DejaVu Sans</family></prefer></alias>
  <alias binding="strong"><family>monospace</family><prefer><family>DejaVu Sans</family></prefer></alias>
</fontconfig>
