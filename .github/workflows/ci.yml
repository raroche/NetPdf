# Phase-5 cross-platform CI — build + test + AOT publish across the support matrix, plus the
# visual-regression and BenchmarkDotNet gates. (Security fuzz + dependency scan live in fuzz-smoke.yml.)
#
# Phase-5 work-breakdown tasks 1–4:
#   T1 build+test matrix · T2 AOT publish gate · T3 visual-regression Docker gate · T4 benchmark gate.
name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # T1 — build + test across the OS/arch matrix. T2 — AOT publish gate, folded in per entry.
  build-test:
    name: build+test (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,   label: linux-x64,   aot: true }
          - { os: ubuntu-24.04-arm, label: linux-arm64, aot: true }
          - { os: windows-latest,  label: windows-x64, aot: true }
          - { os: macos-14,        label: macos-arm64, aot: true }
          - { os: macos-13,        label: macos-x64,   aot: true }
    steps:
      - uses: actions/checkout@v4
      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # Linux native prerequisites: (a) the native-AOT toolchain — clang links against the zlib dev
      # headers; macOS ships clang with the Xcode CLT and Windows ships MSVC on the hosted runners, so
      # only Linux needs an explicit install. (b) SkiaSharp's raster-fallback native (libSkiaSharp)
      # dlopens libfontconfig + libuuid at test time; the x64 runner image ships them but the arm64
      # image does not (libSkiaSharp → undefined symbol uuid_generate_random), so install them for both.
      - name: Install native prerequisites (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev libfontconfig1 libuuid1

      - name: Build (Release, 0 warnings)
        run: dotnet build NetPdf.slnx -c Release --nologo

      - name: Test
        run: dotnet test NetPdf.slnx -c Release --nologo

      # T2 — AOT publish + native-smoke + JIT/AOT byte-parity. The helper script is RID-aware
      # (incl. musl); on Windows it runs under Git Bash (available on windows-latest).
      - name: AOT publish gate
        if: matrix.aot
        shell: bash
        run: bash scripts/aot-parity.sh

  # T1/T2 — Alpine (musl) build + test + AOT, inside the pinned .NET SDK container.
  # BEST-EFFORT / NON-BLOCKING (continue-on-error): the SkiaSharp raster-fallback native
  # (libSkiaSharp) fails to load under musl on the stock SDK-alpine image — a pre-existing
  # environment gap that needs hardening on a real Alpine runner (musl native-asset + font
  # deps), not reproducible on the macOS/glibc dev box. Until that's hardened the leg runs and
  # surfaces its status but does not gate merge; the five glibc/Windows/macOS legs above are the
  # enforcing matrix. Tracked as a Phase-5 remainder in docs/phases/phase-5-packaging-and-release.md.
  build-test-alpine:
    name: build+test (alpine-musl-x64, non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 40
    container: mcr.microsoft.com/dotnet/sdk:10.0-alpine
    steps:
      - uses: actions/checkout@v4
      - name: Install AOT + SkiaSharp prerequisites (clang, musl-dev, zlib, fontconfig)
        run: apk add --no-cache clang build-base zlib-dev bash fontconfig
      - name: Build (Release)
        run: dotnet build NetPdf.slnx -c Release --nologo
      - name: Test
        run: dotnet test NetPdf.slnx -c Release --nologo
      - name: AOT publish gate (musl RID)
        run: bash scripts/aot-parity.sh

  # T3 — visual-regression gate in the pinned-Chrome Docker image. INERT (green) until the canonical
  # Linux reference PNGs are committed under tests/NetPdf.RenderingCorpus/references/ (VisualGatePolicy),
  # so this job is safe to run now. Reference GENERATION stays a deliberate manual/maintainer step
  # (docs/phases … tests/NetPdf.RenderingCorpus/docker/README.md) — never regenerated automatically here.
  visual-regression:
    name: visual-regression (linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Run the visual-regression gate (PDFium diff vs committed Chrome references)
        # PDFium ships in-process via the PDFtoImage test dep — no Docker needed to RUN the gate; the
        # Docker image is only for REGENERATING references (a manual maintainer step). The gate stays
        # inert until references land, then enforces Δ<4 / SSIM≥0.98 per page.
        run: dotnet test tests/NetPdf.RenderingCorpus/NetPdf.RenderingCorpus.csproj -c Release --nologo --filter "FullyQualifiedName~Visual"

  # T4 — BenchmarkDotNet performance gate. Compares against the pinned per-platform baseline
  # (tests/NetPdf.Benchmarks/baselines/…) with a +25% tolerance. Non-blocking (exit 2 → neutral) until a
  # Linux baseline is captured + committed; once present it fails the build on a regression.
  benchmarks:
    name: benchmark gate (linux-x64)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Run benchmark gate (vs pinned baseline, +25% tolerance)
        shell: bash
        run: |
          set +e
          bash scripts/benchmark-gate.sh
          code=$?
          if [ "$code" = "2" ]; then
            echo "::notice::No committed baseline for this platform yet — benchmark gate is neutral (SEC/Phase-5 follow-up: capture + commit a baseline)."
            exit 0
          fi
          exit $code
