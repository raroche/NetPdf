version: 2
updates:
  # NuGet — central package management (Directory.Packages.props at the repo root).
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      # Batch low-risk patch/minor bumps into a single PR to cut review churn.
      nuget-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used by the CI / release / docs workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"

  # The visual-regression reference-generator image.
  - package-ecosystem: "docker"
    directory: "/tests/NetPdf.RenderingCorpus/docker"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
