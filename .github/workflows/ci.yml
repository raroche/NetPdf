# Phase-5 cross-platform CI — build + test + AOT publish across the support matrix, plus the
# visual-regression and BenchmarkDotNet gates. (Security fuzz + dependency scan live in fuzz-smoke.yml.)
#
# Phase-5 work-breakdown tasks 1–4:
#   T1 build+test matrix · T2 AOT publish gate · T3 visual-regression Docker gate · T4 benchmark gate.
name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # T1 — build + test across the OS/arch matrix. T2 — AOT publish gate, folded in per entry.
  build-test:
    name: build+test (${{ matrix.label }}${{ matrix.nonblocking && ', non-blocking' || '' }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    # Two matrix legs are NON-BLOCKING (continue-on-error via a `nonblocking: true` flag) — they run and
    # surface status but don't gate merge. Both are tracked as Phase-5 remainders in docs/deferrals.md:
    #   linux-arm64 → deferral `ci-nonblocking-platform-native-deps` (also covers the alpine leg below);
    #   macos-x64   → deferral `ci-nonblocking-macos-x64-runner-availability`.
    #   * linux-arm64 — SkiaSharp's raster-fallback native (libSkiaSharp) on the arm64 image is
    #     under-provisioned: it resolves symbols from the *system* libuuid / libfreetype the runner doesn't
    #     satisfy (undefined uuid_generate_random, then — once libuuid is preloaded — FT_Get_BDF_Property).
    #     Chasing these per-symbol isn't reproducible on the macOS/x64 dev box; the real fix is to harden the
    #     arm64 native (e.g. the self-contained NoDependencies SkiaSharp asset) on a real arm64 runner. NOTE:
    #     do NOT set a matrix-wide LD_PRELOAD to paper over it — Git Bash (Cygwin) on the Windows leg honors
    #     LD_PRELOAD and aborts if the named lib is absent.
    #   * macos-x64 (macos-13) — GitHub is deprecating the Intel-mac hosted runners; the leg is chronically
    #     unschedulable (stays queued for the whole timeout). macos-arm64 provides the enforcing macOS
    #     coverage; Intel-mac is best-effort until a runner is available.
    # Enforcing matrix: linux-x64, windows-x64, macos-arm64.
    continue-on-error: ${{ matrix.nonblocking == true }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,   label: linux-x64,   aot: true }
          - { os: ubuntu-24.04-arm, label: linux-arm64, aot: true, nonblocking: true }
          - { os: windows-latest,  label: windows-x64, aot: true }
          - { os: macos-14,        label: macos-arm64, aot: true }
          - { os: macos-13,        label: macos-x64,   aot: true, nonblocking: true }
    steps:
      - uses: actions/checkout@v7
      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      # Native-AOT toolchain for the Linux legs: clang links against the zlib dev headers. macOS ships
      # clang with the Xcode CLT and Windows ships MSVC on the hosted runners, so only Linux needs this.
      - name: Install AOT prerequisites (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      # The ubuntu-24.04-arm runner ships a fontconfig sample conf that uses a <reset-dirs> element the
      # installed fontconfig rejects; the parse error crashes the SkiaSharp/HarfBuzz test host ("Test host
      # process crashed"). Drop the offending conf and install a base font so text-dependent tests render.
      # Scoped to the arm64 leg so the x64 leg's font resolution (and its byte-identical snapshots) are
      # untouched.
      - name: Harden fontconfig + fonts (linux-arm64)
        if: matrix.label == 'linux-arm64'
        run: |
          sudo rm -f /etc/fonts/conf.d/05-reset-dirs-sample.conf \
                     /usr/share/fontconfig/conf.avail/05-reset-dirs-sample.conf || true
          sudo apt-get install -y fonts-dejavu-core
          sudo fc-cache -f || true

      - name: Build (Release, 0 warnings)
        run: dotnet build NetPdf.slnx -c Release --nologo

      - name: Test
        run: dotnet test NetPdf.slnx -c Release --nologo

      # T2 — AOT publish + native-smoke + JIT/AOT byte-parity. The helper script is RID-aware
      # (incl. musl); on Windows it runs under Git Bash (available on windows-latest).
      - name: AOT publish gate
        if: matrix.aot
        shell: bash
        run: bash scripts/aot-parity.sh

  # T1/T2 — Alpine (musl) build + test + AOT, inside the pinned .NET SDK container.
  # BEST-EFFORT / NON-BLOCKING (continue-on-error): the SkiaSharp raster-fallback native
  # (libSkiaSharp) fails to load under musl on the stock SDK-alpine image — a pre-existing
  # environment gap that needs hardening on a real Alpine runner (musl native-asset + font
  # deps), not reproducible on the macOS/glibc dev box. Until that's hardened the leg runs and
  # surfaces its status but does not gate merge; the ENFORCING matrix is exactly three legs —
  # linux-x64, windows-x64, macos-arm64 — while linux-arm64 and macos-x64 (above) plus this alpine
  # leg are the three NON-BLOCKING legs. Tracked as a known CI-hardening remainder: docs/deferrals.md
  # deferral `ci-nonblocking-platform-native-deps`.
  build-test-alpine:
    name: build+test (alpine-musl-x64, non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 40
    container: mcr.microsoft.com/dotnet/sdk:10.0-alpine
    steps:
      - uses: actions/checkout@v7
      - name: Install AOT + SkiaSharp prerequisites (clang, musl-dev, zlib, fontconfig, fonts)
        # ttf-dejavu + freetype give the SkiaSharp/HarfBuzz text stack real fonts; without them the stock
        # SDK-alpine image has none, so text collapses to zero size and decoration/annotation-counting tests
        # render nothing (Expected N, Actual 0).
        run: apk add --no-cache clang build-base zlib-dev bash fontconfig freetype ttf-dejavu
      - name: Build (Release)
        run: dotnet build NetPdf.slnx -c Release --nologo
      - name: Test
        run: dotnet test NetPdf.slnx -c Release --nologo
      - name: AOT publish gate (musl RID)
        run: bash scripts/aot-parity.sh

  # T3 — visual-regression gate in the pinned-Chrome Docker image. INERT (green) until the canonical
  # Linux reference PNGs are committed under tests/NetPdf.RenderingCorpus/references/ (VisualGatePolicy),
  # so this job is safe to run now. Reference GENERATION stays a deliberate manual/maintainer step
  # (docs/phases … tests/NetPdf.RenderingCorpus/docker/README.md) — never regenerated automatically here.
  visual-regression:
    name: visual-regression (linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Run the visual-regression gate (PDFium diff vs committed Chrome references)
        # PDFium ships in-process via the PDFtoImage test dep — no Docker needed to RUN the gate; the
        # Docker image is only for REGENERATING references (a manual maintainer step). The gate stays
        # inert until references land, then enforces Δ<4 / SSIM≥0.98 per page.
        run: dotnet test tests/NetPdf.RenderingCorpus/NetPdf.RenderingCorpus.csproj -c Release --nologo --filter "FullyQualifiedName~Visual"

  # T4 — BenchmarkDotNet performance gate. Compares against the pinned per-platform baseline
  # (tests/NetPdf.Benchmarks/baselines/…) with a +25% tolerance. Non-blocking (exit 2 → neutral) until a
  # Linux baseline is captured + committed; once present it fails the build on a regression.
  benchmarks:
    name: benchmark gate (linux-x64)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v7
      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Run benchmark gate (vs pinned baseline, +25% tolerance)
        shell: bash
        run: |
          set +e
          bash scripts/benchmark-gate.sh
          code=$?
          if [ "$code" = "2" ]; then
            echo "::notice::No committed baseline for this platform yet — benchmark gate is neutral (SEC/Phase-5 follow-up: capture + commit a baseline)."
            exit 0
          fi
          exit $code
