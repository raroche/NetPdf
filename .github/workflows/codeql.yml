# CodeQL static analysis (C#). Complements the vulnerable-dependency scan in fuzz-smoke.yml (which covers
# KNOWN-CVE packages) with source-level security/quality analysis of our own code. Manual build mode: .NET 10
# is recent enough that autobuild can misfire, so we set the SDK up and build the solution explicitly.
name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full scan so newly-published queries run against unchanged code, too.
    - cron: "23 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (csharp)
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload results to the Security tab
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp
          build-mode: manual

      - name: Build
        run: dotnet build NetPdf.slnx -c Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:csharp"
